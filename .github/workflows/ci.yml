name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Windows validation
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Sync Python dependencies
        run: uv sync --locked

      - name: Run backend tests
        run: uv run python -m unittest discover -s tests

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check committed whitespace errors
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if ($env:EVENT_NAME -eq "pull_request") {
            git diff --check "$env:BASE_SHA" "$env:HEAD_SHA"
          } elseif ($env:BEFORE_SHA -and $env:BEFORE_SHA -notmatch '^0+$') {
            git diff --check "$env:BEFORE_SHA" "$env:HEAD_SHA"
          } else {
            git diff --check "$env:HEAD_SHA^" "$env:HEAD_SHA"
          }

      - name: Import smoke test
        run: >
          uv run python -c
          "from core.api import app; from launcher import main;
          assert app.title == 'APEX API';
          assert callable(main)"
